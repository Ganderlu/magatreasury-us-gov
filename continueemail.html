<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Continue</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f7;
        --card: #ffffff;
        --text: #111827;
        --muted: rgba(17, 24, 39, 0.6);
        --border: rgba(17, 24, 39, 0.12);
        --shadow: 0 18px 60px rgba(17, 24, 39, 0.12);
        --radius: 10px;
        --primary: #0a5bd3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 34px 16px;
      }
      .stack {
        width: min(520px, 100%);
        display: grid;
        justify-items: center;
        gap: 16px;
      }
      .card {
        width: 100%;
        background: var(--card);
        border-radius: var(--radius);
        border: 1px solid rgba(17, 24, 39, 0.08);
        box-shadow: var(--shadow);
        padding: 28px 28px 22px;
      }
      .limited-offer {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
      }
      .limited-offer img {
        width: min(320px, 100%);
        height: auto;
        display: block;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 850;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 6px 0 16px;
        font-size: 12px;
        color: var(--muted);
      }
      .sub b {
        color: rgba(17, 24, 39, 0.85);
      }
      .input {
        width: 100%;
        height: 48px;
        border-radius: 8px;
        border: 2px solid rgba(10, 91, 211, 0.9);
        padding: 0 12px;
        font-size: 14px;
        outline: none;
        background: #ffffff;
        color: var(--text);
      }
      .input::placeholder {
        color: rgba(17, 24, 39, 0.5);
      }
      .input[disabled] {
        background: rgba(17, 24, 39, 0.02);
        color: rgba(17, 24, 39, 0.65);
        cursor: not-allowed;
      }
      .helper {
        margin: 10px 0 0;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.7);
        line-height: 1.45;
      }
      .btn {
        width: 100%;
        height: 48px;
        border-radius: 8px;
        border: 0;
        background: var(--primary);
        color: #ffffff;
        font-weight: 850;
        font-size: 14px;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .link {
        display: inline-block;
        margin-top: 12px;
        font-size: 12px;
        font-weight: 750;
        color: #2563eb;
        text-decoration: none;
      }
      .link:hover {
        text-decoration: underline;
      }
      .privacy {
        font-size: 12px;
        color: #2563eb;
        text-decoration: none;
      }
      .privacy:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stack">
        <div class="card">
          <div class="limited-offer">
            <img
              src="https://cdn.shopify.com/s/files/1/0967/3775/5412/files/LIMITED_TIME_OFFER_3_x320.png?v=1772663214"
              alt="LIMITED TIME OFFER"
            >
          </div>

          <h1>Enter code</h1>
          <div class="sub">Sent to <b id="email"></b></div>

          <input class="input" type="text" inputmode="numeric" placeholder="6-digit code" disabled>

          <button id="submit" class="btn" type="button">Submit</button>

          <a class="link" href="/login.html">Sign in with a different email</a>

          <div class="helper">
            Open your email and use the sign-in link we sent to continue to Our Maga Shop.
          </div>
        </div>

        <a class="privacy" href="/policies/privacy.html">Privacy policy</a>
      </div>
    </div>

    <script>
      (function () {
        var emailEl = document.getElementById('email');
        var submitBtn = document.getElementById('submit');

        function getParam(name) {
          try {
            var u = new URL(window.location.href);
            return u.searchParams.get(name) || '';
          } catch (e) {
            return '';
          }
        }

        var email = getParam('email');
        if (!email) {
          try {
            email = localStorage.getItem('loginEmail') || '';
          } catch (e) {}
        }
        emailEl.textContent = email || 'your email';

        submitBtn.addEventListener('click', function () {
          window.location.href = '/orders.html';
        });
      })();
    </script>
  </body>
</html>
