<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cryptomus</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #000;
        color: #f2f2f2;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            60% 60% at 50% 30%,
            rgba(255, 255, 255, 0.12),
            rgba(0, 0, 0, 0) 60%
          ),
          rgba(0, 0, 0, 1);
      }
      .wrap {
        position: relative;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 26px;
      }
      .card {
        width: 380px;
        max-width: 100%;
        border-radius: 16px;
        background: linear-gradient(
          180deg,
          #3a3a3a 0%,
          #242424 55%,
          #1e1e1e 100%
        );
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        padding: 16px 16px 14px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .back {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.22);
        color: #fff;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        text-transform: lowercase;
        color: #fff;
        user-select: none;
      }
      .brandlogo {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        display: inline-block;
        object-fit: contain;
      }
      .brandtext {
        font-size: 14px;
        letter-spacing: 0.3px;
      }
      .h1 {
        font-size: 22px;
        font-weight: 800;
        margin-top: 6px;
        margin-bottom: 10px;
      }
      .amount {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 10px;
        font-weight: 600;
      }
      .sub {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 6px;
      }
      .note {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 10px;
      }
      .noteicon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 12px;
      }
      .exp {
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .explabel {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }
      .expval {
        font-size: 12px;
        color: #41d17d;
        font-weight: 800;
        letter-spacing: 0.3px;
      }
      .selects {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }
      .select {
        width: 100%;
        height: 44px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.22);
        color: rgba(255, 255, 255, 0.85);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 12px;
        cursor: pointer;
        font-size: 12px;
      }
      .selecttext {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .chev {
        color: rgba(255, 255, 255, 0.65);
        font-size: 14px;
      }
      .menu {
        display: none;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #1b1b1b;
        margin-bottom: 12px;
      }
      .menu.is-open {
        display: block;
      }
      .menuitem {
        width: 100%;
        text-align: left;
        padding: 12px;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        cursor: pointer;
      }
      .menuitem:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .proceed {
        width: 100%;
        height: 44px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.55);
        font-weight: 700;
        cursor: not-allowed;
        margin-top: 4px;
      }
      .proceed.is-enabled {
        background: #2a7cff;
        border-color: rgba(255, 255, 255, 0);
        color: #fff;
        cursor: pointer;
      }
      .footer {
        margin-top: 14px;
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }
      .aml {
        color: rgba(255, 255, 255, 0.65);
        text-decoration: underline;
        display: inline-block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .help {
        margin-bottom: 10px;
      }
      .icons {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .ic {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.75);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="wrap">
      <div class="card">
        <div class="top">
          <button class="back" type="button" aria-label="Back">‹</button>
          <div class="brand">
            <img class="brandlogo" src="/assets/cca.png" alt="cca" />
            <span class="brandtext">cryptomus</span>
          </div>
          <span></span>
        </div>
        <div class="h1">Select currency</div>
        <div class="amount" id="cm-amount">0 USD</div>
        <div class="sub">Select network</div>
        <div class="note">
          <span class="noteicon">i</span><span>You pay network fee</span>
        </div>
        <div class="exp">
          <span class="explabel">Expiration time</span>
          <span class="expval" id="cm-exp">00:57:01</span>
        </div>
        <div class="selects">
          <button class="select" type="button" id="cm-currency">
            <span class="selecttext" id="cm-currency-text"
              >Select currency</span
            >
            <span class="chev">⌄</span>
          </button>
          <button class="select" type="button" id="cm-network">
            <span class="selecttext" id="cm-network-text">Select network</span>
            <span class="chev">⌄</span>
          </button>
        </div>
        <div class="menu" id="cm-menu"></div>
        <button class="proceed" type="button" id="cm-proceed" disabled>
          Proceed to the payment
        </button>
        <div class="footer">
          <a class="aml" href="#" onclick="return false;">AML Policy</a>
          <div class="help">Please contact us if you have any questions</div>
          <div class="icons">
            <span class="ic">✈</span><span class="ic">ⓘ</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        function pad2(n) {
          return n < 10 ? "0" + String(n) : String(n);
        }
        function formatAmount(n) {
          if (!isFinite(n)) return "0";
          var cents = Math.round(n * 100) / 100;
          var isInt = Math.abs(cents - Math.round(cents)) < 1e-9;
          return isInt ? String(Math.round(cents)) : cents.toFixed(2);
        }
        var params = new URLSearchParams(location.search);
        var amount = Number(params.get("amount") || "0");
        var currency = String(params.get("currency") || "USD").toUpperCase();
        var returnUrl = String(params.get("return") || "/checkout.html");

        var amountEl = document.getElementById("cm-amount");
        amountEl.textContent = formatAmount(amount) + " " + currency;

        var until = Date.now() + (57 * 60 + 1) * 1000;
        var expEl = document.getElementById("cm-exp");
        function tick() {
          var left = Math.max(0, until - Date.now());
          var s = Math.floor(left / 1000);
          var h = Math.floor(s / 3600);
          var m = Math.floor((s % 3600) / 60);
          var r = s % 60;
          expEl.textContent = pad2(h) + ":" + pad2(m) + ":" + pad2(r);
          if (left > 0) setTimeout(tick, 250);
        }
        tick();

        var menu = document.getElementById("cm-menu");
        var curBtn = document.getElementById("cm-currency");
        var netBtn = document.getElementById("cm-network");
        var curText = document.getElementById("cm-currency-text");
        var netText = document.getElementById("cm-network-text");
        var proceed = document.getElementById("cm-proceed");

        var selectedCurrency = null;
        var selectedNetwork = null;

        var currencies = [
          "USDT",
          "BTC",
          "ETH",
          "QNT",
          "ALGO",
          "XDC",
          "XLM",
          "XRP",
          "ADA",
        ];

        function getNetworks(sym) {
          if (
            sym === "USDT"   
          ) {
            return ["TRC20", "ERC20", "BEP20"];
          }
           if (sym === "BTC") return ["BTC"];
          if (sym === "ETH") return ["ETH"];
          if (sym === "ADA") return ["ADA"];
          if (sym === "QNT") return ["QNT"];
          if (sym === "ALGO") return ["ALGO"];
          if (sym === "XRP") return ["XRP"];
          if (sym === "XDC") return ["XDC"];
          if (sym === "XLM") return ["XLM"];
          return ["Mainnet"];
        }

        function closeMenu() {
          menu.classList.remove("is-open");
          menu.innerHTML = "";
        }

        function openMenu(items, onPick) {
          menu.innerHTML = "";
          for (var i = 0; i < items.length; i++) {
            (function () {
              var it = items[i];
              var row = document.createElement("button");
              row.type = "button";
              row.className = "menuitem";
              row.textContent = it;
              row.addEventListener("click", function () {
                onPick(it);
                closeMenu();
              });
              menu.appendChild(row);
            })();
          }
          menu.classList.add("is-open");
        }

        function refreshProceed() {
          var ok = !!(selectedCurrency && selectedNetwork);
          proceed.disabled = !ok;
          proceed.classList.toggle("is-enabled", ok);
        }

        curBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          openMenu(currencies, function (v) {
            selectedCurrency = v;
            curText.textContent = v;
            selectedNetwork = null;
            netText.textContent = "Select network";
            refreshProceed();
          });
        });

        netBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          if (!selectedCurrency) {
            openMenu(["Select currency first"], function () {});
            return;
          }
          var nets = getNetworks(selectedCurrency);
          openMenu(nets, function (v) {
            selectedNetwork = v;
            netText.textContent = v;
            refreshProceed();
          });
        });

        document.addEventListener("click", function () {
          closeMenu();
        });

        proceed.addEventListener("click", function () {
          if (proceed.disabled) return;
          var url =
            "/cryptomus-proceed.html?amount=" +
            encodeURIComponent(String(amount)) +
            "&currency=" +
            encodeURIComponent(currency) +
            "&coin=" +
            encodeURIComponent(String(selectedCurrency)) +
            "&network=" +
            encodeURIComponent(String(selectedNetwork)) +
            "&return=" +
            encodeURIComponent(returnUrl);
          location.href = url;
        });

        document.querySelector(".back").addEventListener("click", function () {
          location.href = returnUrl;
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") location.href = returnUrl;
        });
      })();
    </script>
  </body>
</html>
