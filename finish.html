<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify your email</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #0f172a;
      --muted: rgba(15, 23, 42, 0.62);
      --muted-2: rgba(15, 23, 42, 0.45);
      --box: rgba(15, 23, 42, 0.06);
      --border: rgba(15, 23, 42, 0.14);
      --border-strong: rgba(15, 23, 42, 0.62);
      --purple: #5a31f4;
      --shadow: 0 12px 30px rgba(90, 49, 244, 0.22);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .page {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px 16px 58px;
    }
    .card {
      width: min(560px, 100%);
      text-align: center;
    }
    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(90,49,244,0.2), rgba(90,49,244,0.08));
      border: 1px solid rgba(90,49,244,0.22);
      display: grid;
      place-items: center;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 850;
      letter-spacing: -0.03em;
    }
    .sub {
      margin: 8px 0 18px;
      font-size: 14px;
      color: var(--muted);
    }
    .sub b {
      color: rgba(15, 23, 42, 0.85);
    }
    .otp {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin: 8px 0 14px;
    }
    .otp input {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      border: 1.5px solid rgba(15, 23, 42, 0.14);
      background: var(--box);
      outline: none;
      text-align: center;
      font-size: 18px;
      font-weight: 850;
      color: rgba(15, 23, 42, 0.9);
    }
    .otp input:focus {
      border-color: rgba(90, 49, 244, 0.55);
      box-shadow: 0 0 0 3px rgba(90, 49, 244, 0.12);
      background: #ffffff;
    }
    .otp input.is-active {
      border-color: var(--border-strong);
      background: #ffffff;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.22);
      align-self: center;
    }
    .btn {
      width: min(320px, 100%);
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: var(--purple);
      color: #ffffff;
      font-weight: 850;
      font-size: 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .link {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 750;
      color: rgba(15, 23, 42, 0.72);
      text-decoration: none;
    }
    .link:hover {
      text-decoration: underline;
    }
    .status {
      margin-top: 12px;
      min-height: 16px;
      font-size: 12px;
    }
    .status.is-error {
      color: #b42318;
    }
    .status.is-success {
      color: #067647;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 8.5 12 13.5 20 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Verify your email</h1>
      <div class="sub">
        Enter the 6-digit code sent to <b id="email-text"></b>
      </div>

      <form id="finish-form" autocomplete="one-time-code">
        <div class="otp" id="otp">
          <input inputmode="numeric" maxlength="1" aria-label="Digit 1"/>
          <input inputmode="numeric" maxlength="1" aria-label="Digit 2"/>
          <input inputmode="numeric" maxlength="1" aria-label="Digit 3"/>
          <span class="dot" aria-hidden="true"></span>
          <input inputmode="numeric" maxlength="1" aria-label="Digit 4"/>
          <input inputmode="numeric" maxlength="1" aria-label="Digit 5"/>
          <input inputmode="numeric" maxlength="1" aria-label="Digit 6"/>
        </div>
        <button id="verify" class="btn" type="submit">Continue</button>
        <div id="status" class="status"></div>
      </form>

      <a class="link" href="/shop.html">Change email address</a>
    </div>
  </div>

  <script src="/assets/local-storage.js"></script>
  <script src="https://cdn.auth0.com/js/auth0/9.24/auth0.min.js"></script>
  <script>
    (function () {
      const emailText = document.getElementById("email-text");
      const form = document.getElementById("finish-form");
      const statusEl = document.getElementById("status");
      const verifyBtn = document.getElementById("verify");
      const inputs = Array.from(document.querySelectorAll("#otp input"));

      let email = "";

      function setStatus(text, kind = "") {
        statusEl.textContent = text;
        statusEl.className = `status ${kind}`;
      }

      // Get email from URL or localStorage
      email = new URLSearchParams(window.location.search).get("email") || 
              localStorage.getItem("loginEmail") || "";

      emailText.textContent = email || "your email";

      // OTP Input Logic
      function focusInput(i) {
        if (inputs[i]) {
          inputs[i].focus();
          inputs.forEach((inp, idx) => inp.classList.toggle("is-active", idx === i));
        }
      }

      function getCode() {
        return inputs.map(input => input.value).join("");
      }

      inputs.forEach((input, idx) => {
        input.addEventListener("input", () => {
          input.value = input.value.replace(/\D/g, "").slice(0, 1);
          if (input.value && idx < inputs.length - 1) focusInput(idx + 1);
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !input.value && idx > 0) focusInput(idx - 1);
          if (e.key === "ArrowLeft" && idx > 0) focusInput(idx - 1);
          if (e.key === "ArrowRight" && idx < inputs.length - 1) focusInput(idx + 1);
        });

        input.addEventListener("paste", (e) => {
          const text = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
          if (!text) return;
          e.preventDefault();
          text.split("").forEach((char, i) => {
            if (inputs[i]) inputs[i].value = char;
          });
          focusInput(Math.min(text.length, inputs.length - 1));
        });
      });

      if (inputs[0]) focusInput(0);

      function getAuth0Config() {
        return window.AppLocalStorage ? 
               window.AppLocalStorage.getAuth0Config() : {
                 domain: localStorage.getItem("auth0Domain") || "",
                 clientId: localStorage.getItem("auth0ClientId") || ""
               };
      }

      function isWrongOtpError(err) {
        const msg = String(err?.description || err?.message || "").toLowerCase();
        return msg.includes("wrong") || msg.includes("invalid") || msg.includes("code");
      }

      function exchangeOtpForTokens(cfg, code, callback) {
        fetch(`https://${cfg.domain}/oauth/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            grant_type: "http://auth0.com/oauth/grant-type/passwordless/otp",
            client_id: cfg.clientId,
            realm: "email",
            username: email,
            otp: code,
            scope: "openid profile email"
          })
        })
        .then(res => res.json().then(data => ({ res, data })))
        .then(({ res, data }) => {
          if (!res.ok) return callback(data);
          callback(null, data);
        })
        .catch(err => callback(err));
      }

      function saveUserToMongo(idToken) {
        return fetch("/api/users/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: email,
            idToken: idToken,
            method: "auth0_passwordless_email"
          })
        }).then(res => res.json()).catch(() => ({}));
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const code = getCode();

        if (code.length !== 6) {
          setStatus("Please enter the full 6-digit code", "error");
          return;
        }

        const cfg = getAuth0Config();
        if (!cfg.domain || !cfg.clientId) {
          setStatus("Auth0 configuration missing", "error");
          return;
        }

        verifyBtn.disabled = true;
        setStatus("Verifying code...");

        exchangeOtpForTokens(cfg, code, async (err, authResult) => {
          if (err) {
            verifyBtn.disabled = false;
            setStatus(isWrongOtpError(err) ? "Wrong code. Please try again." : "Verification failed. Try again.", "error");
            return;
          }

          // Save to MongoDB
          await saveUserToMongo(authResult.id_token || authResult.idToken);

          setStatus("Login successful ✓ Redirecting...", "success");
          
          setTimeout(() => {
            window.location.replace("/orders.html");
          }, 1000);
        });
      });
    })();
  </script>
</body>
</html>
