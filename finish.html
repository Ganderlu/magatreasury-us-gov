<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify your email</title>
    <style>
      :root {
        --shop-purple: #5a31f4;
        --bg-white: #ffffff;
        --text-dark: #000000;
        --text-muted: #616161;
        --input-bg: #f5f5f5;
        --border-active: #000000;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-white);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        color: var(--text-dark);
      }
      .container {
        width: 100%;
        max-width: 500px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .phone-icon {
        width: 48px;
        height: 72px;
        background-color: #1a1a3a;
        border-radius: 8px;
        position: relative;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      .phone-icon::before {
        content: "";
        position: absolute;
        top: 4px;
        width: 12px;
        height: 2px;
        background-color: #333;
        border-radius: 1px;
      }
      .mail-box {
        width: 24px;
        height: 16px;
        background-color: white;
        border-radius: 2px;
        position: relative;
      }
      .notification-dot {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 8px;
        height: 8px;
        background-color: #ff4d4d;
        border-radius: 50%;
        border: 1.5px solid #1a1a3a;
      }
      h1 {
        font-size: 32px;
        font-weight: 700;
        margin: 0 0 12px 0;
        letter-spacing: -0.02em;
      }
      .subtitle {
        color: var(--text-muted);
        font-size: 16px;
        margin-bottom: 40px;
      }
      .subtitle b {
        color: var(--text-dark);
      }
      .otp-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
      }
      .otp-group {
        display: flex;
        gap: 8px;
      }
      .otp-input {
        width: 48px;
        height: 56px;
        background-color: var(--input-bg);
        border: 2px solid transparent;
        border-radius: 12px;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        outline: none;
        transition:
          border-color 0.2s,
          background-color 0.2s;
      }
      .otp-input:focus {
        border-color: var(--border-active);
        background-color: #ffffff;
      }
      .dot {
        width: 4px;
        height: 4px;
        background-color: #d1d1d1;
        border-radius: 50%;
        margin: 0 4px;
      }
      .change-email {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dark);
        text-decoration: none;
        margin-top: 8px;
      }
      .change-email:hover {
        text-decoration: underline;
      }
      .language-selector {
        margin-top: auto;
        padding-top: 60px;
        font-size: 12px;
        color: #888888;
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .language-selector svg {
        width: 12px;
        height: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="phone-icon">
        <div class="mail-box">
          <div class="notification-dot"></div>
        </div>
      </div>

      <h1>Verify your email</h1>
      <div class="subtitle">
        Enter code sent to <b id="email-display">if@gmail.com</b>
      </div>

      <div class="otp-container">
        <div class="otp-group">
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
            autofocus
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
          />
        </div>
        <div class="dot"></div>
        <div class="otp-group">
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            pattern="\d*"
            inputmode="numeric"
          />
        </div>
      </div>

      <a href="/login.html" class="change-email">Change email address</a>
    </div>

    <div class="language-selector">
      English
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>

    <script>
      (function () {
        var emailDisplay = document.getElementById("email-display");
        var inputs = document.querySelectorAll(".otp-input");

        // Load real email from localStorage
        try {
          var savedEmail = localStorage.getItem("loginEmail");
          if (savedEmail) {
            emailDisplay.textContent = savedEmail;
          }
        } catch (e) {}

        // Handle auto-focus and auto-tabbing
        inputs.forEach((input, index) => {
          input.addEventListener("input", (e) => {
            if (e.target.value && index < inputs.length - 1) {
              inputs[index + 1].focus();
            }

            // Check if all filled
            var code = Array.from(inputs)
              .map((i) => i.value)
              .join("");
            if (code.length === 6) {
              // Redirect to orders
              setTimeout(() => {
                window.location.href = "/orders.html";
              }, 400);
            }
          });

          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value && index > 0) {
              inputs[index - 1].focus();
            }
          });

          // Prevent non-numeric input
          input.addEventListener("keypress", (e) => {
            if (!/[0-9]/.test(e.key)) {
              e.preventDefault();
            }
          });
        });
      })();
    </script>
  </body>
</html>
