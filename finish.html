<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify your email</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #0f172a;
        --muted: rgba(15, 23, 42, 0.62);
        --muted-2: rgba(15, 23, 42, 0.45);
        --box: rgba(15, 23, 42, 0.06);
        --border: rgba(15, 23, 42, 0.2);
        --border-strong: rgba(15, 23, 42, 0.62);
        --purple: #5a31f4;
        --shadow: 0 12px 30px rgba(90, 49, 244, 0.22);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      .page {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 32px 16px 58px;
      }
      .card {
        width: min(560px, 100%);
        text-align: center;
        display: grid;
        justify-items: center;
      }
      .icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: linear-gradient(
          180deg,
          rgba(90, 49, 244, 0.2),
          rgba(90, 49, 244, 0.08)
        );
        border: 1px solid rgba(90, 49, 244, 0.22);
        display: grid;
        place-items: center;
        margin-bottom: 16px;
      }
      .icon svg {
        width: 22px;
        height: 22px;
        color: rgba(90, 49, 244, 0.95);
      }
      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 850;
        letter-spacing: -0.03em;
      }
      .sub {
        margin: 8px 0 18px;
        font-size: 14px;
        color: var(--muted);
      }
      .sub b {
        color: rgba(15, 23, 42, 0.85);
      }
      .email-box {
        width: min(320px, 100%);
        height: 44px;
        border-radius: 999px;
        border: 1.5px solid rgba(15, 23, 42, 0.42);
        padding: 0 16px;
        font-size: 14px;
        outline: none;
        background: #ffffff;
        color: var(--text);
        margin: 8px 0 12px;
      }
      .email-box:focus {
        border-color: rgba(90, 49, 244, 0.65);
        box-shadow: 0 0 0 3px rgba(90, 49, 244, 0.12);
      }
      .btn {
        width: min(320px, 100%);
        height: 44px;
        border: 0;
        border-radius: 999px;
        background: var(--purple);
        color: #ffffff;
        font-weight: 800;
        font-size: 14px;
        cursor: pointer;
        box-shadow: var(--shadow);
      }
      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .link {
        margin-top: 12px;
        font-size: 12px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.72);
        text-decoration: none;
      }
      .link:hover {
        text-decoration: underline;
      }
      .status {
        margin-top: 12px;
        min-height: 16px;
        font-size: 12px;
        color: rgba(15, 23, 42, 0.65);
        text-align: center;
      }
      .status.is-error {
        color: #b42318;
      }
      .status.is-success {
        color: #067647;
      }
      .lang {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }
      .lang-inner {
        pointer-events: auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(15, 23, 42, 0.55);
        user-select: none;
      }
      .lang select {
        border: 0;
        background: transparent;
        color: rgba(15, 23, 42, 0.55);
        font-size: 12px;
        outline: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 8.5 12 13.5 20 8.5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1>Verify your email</h1>
        <div class="sub">
          Click the sign-in link sent to <b id="email-text"></b>
        </div>

        <form id="finish-form" autocomplete="one-time-code">
          <input
            id="email-input"
            class="email-box"
            type="email"
            autocomplete="email"
            placeholder="Enter your email"
            style="display: none"
          />
          <button id="verify" class="btn" type="submit">Continue</button>
          <div
            id="status"
            class="status"
            role="status"
            aria-live="polite"
          ></div>
        </form>

        <a class="link" id="change-email" href="/shop.html"
          >Change email address</a
        >
      </div>
    </div>

    <div class="lang" aria-hidden="true">
      <div class="lang-inner">
        <select>
          <option selected>English</option>
        </select>
      </div>
    </div>

    <script src="/firebase/firebase-auth.js"></script>
    <script>
      (function () {
        var emailText = document.getElementById("email-text");
        var form = document.getElementById("finish-form");
        var statusEl = document.getElementById("status");
        var verifyBtn = document.getElementById("verify");
        var emailInput = document.getElementById("email-input");

        function setStatus(text, kind) {
          statusEl.textContent = text || "";
          statusEl.classList.remove("is-error", "is-success");
          if (kind === "error") statusEl.classList.add("is-error");
          if (kind === "success") statusEl.classList.add("is-success");
        }

        function safeString(v) {
          if (v === null || v === undefined) return "";
          return String(v);
        }

        function getParam(name) {
          try {
            var u = new URL(window.location.href);
            return u.searchParams.get(name) || "";
          } catch (e) {
            return "";
          }
        }

        var qpEmail = getParam("email");
        var redirect = getParam("redirect");
        var email = "";
        try {
          email = qpEmail || localStorage.getItem("emailForSignIn") || "";
        } catch (e) {
          email = qpEmail || "";
        }
        if (!redirect) {
          try {
            redirect = localStorage.getItem("postSignInRedirect") || "";
          } catch (e) {}
        }
        emailText.textContent = email || "your email";

        function goDashboard() {
          try {
            var u = new URL("/dashboard.html", window.location.origin);
            if (redirect) u.searchParams.set("redirect", redirect);
            window.location.href = u.toString();
          } catch (e) {
            window.location.href = "/dashboard.html";
          }
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          setStatus("", "");

          verifyBtn.disabled = true;
          setStatus("Verifying…", "");

          FirebaseAuthHelper.init()
            .then(function () {
              if (
                !FirebaseAuthHelper.isSignInWithEmailLink(window.location.href)
              ) {
                setStatus(
                  "Open the link from your email in this browser to continue.",
                  "error",
                );
                throw new Error("not_link");
              }

              var emailToUse = email;
              if (!emailToUse) {
                emailToUse = safeString(emailInput && emailInput.value).trim();
              }
              if (!emailToUse) {
                if (emailInput) {
                  emailInput.style.display = "";
                  emailInput.focus();
                }
                setStatus("Enter your email to finish signing in.", "error");
                throw new Error("need_email");
              }

              return FirebaseAuthHelper.signInWithEmailLink(
                emailToUse,
                window.location.href,
              ).then(function (cred) {
                var signedEmail =
                  cred && cred.user && cred.user.email
                    ? cred.user.email
                    : emailToUse;
                var uid = cred && cred.user && cred.user.uid ? cred.user.uid : null;
                setStatus("Signed in.", "success");
                try {
                  localStorage.removeItem("emailForSignIn");
                } catch (e) {}
                return FirebaseAuthHelper.writeToFirestore("login_attempts", {
                  action: "login_success",
                  method: "email_link",
                  email: signedEmail,
                  uid: uid,
                  sourcePath: window.location.pathname,
                  sourceSearch: window.location.search || "",
                  referrer: document.referrer || "",
                  userAgent: navigator.userAgent || "",
                  createdAt: FirebaseAuthHelper.serverTimestamp(),
                }).then(function () {
                  setTimeout(goDashboard, 350);
                });
              });
            })
            .catch(function (err) {
              var msg = err && err.message ? String(err.message) : "";
              if (msg === "not_link" || msg === "need_email") return;
              setStatus(
                "Verification failed. Try requesting a new link.",
                "error",
              );
            })
            .finally(function () {
              verifyBtn.disabled = false;
            });
        });

        FirebaseAuthHelper.init()
          .then(function () {
            if (
              window.location.protocol !== "http:" &&
              window.location.protocol !== "https:"
            ) {
              setStatus(
                "Open this page using http://localhost:8000/finish.html (not file://) to finish signing in.",
                "error",
              );
              return;
            }
            if (
              FirebaseAuthHelper.isSignInWithEmailLink(window.location.href)
            ) {
              setStatus("Finishing sign-in…", "");
              form.requestSubmit();
              return;
            }
            setStatus(
              "We sent you a sign-in link. Open your email and click it.",
              "",
            );
          })
          .catch(function () {});
      })();
    </script>
  </body>
</html>
