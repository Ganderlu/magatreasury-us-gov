<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heleket</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #f5f6f7;
        color: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 18px 46px;
        gap: 18px;
      }
      .card {
        width: 780px;
        max-width: 100%;
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        padding: 28px 32px 26px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .logo {
        font-weight: 900;
        color: #e11d2e;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      .topRight {
        display: flex;
        align-items: center;
        gap: 14px;
        color: rgba(15, 23, 42, 0.75);
      }
      .iconBtn {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: rgba(15, 23, 42, 0.75);
        font-weight: 900;
      }
      .lang {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        cursor: default;
      }
      .flag {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid rgba(15, 23, 42, 0.12);
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-size: 12px;
      }
      .toPay {
        margin-top: 18px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }
      .toPayLabel {
        font-size: 18px;
        font-weight: 800;
        color: rgba(15, 23, 42, 0.85);
      }
      .toPayAmt {
        font-size: 34px;
        font-weight: 900;
        color: rgba(15, 23, 42, 0.92);
      }
      .divider {
        height: 1px;
        background: rgba(15, 23, 42, 0.08);
        margin: 18px 0 22px;
      }
      .sectionTitle {
        font-size: 18px;
        font-weight: 900;
        margin: 0 0 12px;
        color: rgba(15, 23, 42, 0.92);
      }
      .fieldLabel {
        font-size: 14px;
        font-weight: 800;
        color: rgba(15, 23, 42, 0.75);
        margin: 18px 0 10px;
      }
      .select {
        width: 100%;
        height: 58px;
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        cursor: pointer;
        color: rgba(15, 23, 42, 0.55);
        font-size: 18px;
      }
      .select.is-active {
        color: rgba(15, 23, 42, 0.9);
      }
      .chev {
        color: rgba(15, 23, 42, 0.6);
        font-size: 18px;
      }
      .menu {
        display: none;
        margin-top: 10px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 14px;
        overflow: hidden;
        background: #fff;
        max-height: 280px;
        overflow-y: auto;
      }
      .menu.is-open {
        display: block;
      }
      .menuItem {
        width: 100%;
        text-align: left;
        padding: 14px 18px;
        border: none;
        background: #fff;
        cursor: pointer;
        font-size: 16px;
        color: rgba(15, 23, 42, 0.9);
      }
      .menuItem:hover {
        background: rgba(15, 23, 42, 0.04);
      }
      .proceed {
        margin-top: 22px;
        width: 100%;
        height: 60px;
        border-radius: 999px;
        border: none;
        background: rgba(15, 23, 42, 0.06);
        color: rgba(15, 23, 42, 0.4);
        font-weight: 900;
        font-size: 18px;
        cursor: not-allowed;
      }
      .proceed.is-enabled {
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }
      .timerWrap {
        margin-top: 18px;
        text-align: center;
        color: rgba(15, 23, 42, 0.65);
        font-weight: 800;
      }
      .timerVal {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #16a34a;
        font-weight: 900;
        font-size: 18px;
      }
      .hourglass {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 2px solid rgba(22, 163, 74, 0.6);
        position: relative;
        box-sizing: border-box;
      }
      .hourglass:before,
      .hourglass:after {
        content: "";
        position: absolute;
        left: 3px;
        right: 3px;
        height: 2px;
        background: rgba(22, 163, 74, 0.6);
      }
      .hourglass:before {
        top: 4px;
      }
      .hourglass:after {
        bottom: 4px;
      }
      .powered {
        font-weight: 800;
        color: rgba(15, 23, 42, 0.35);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .powered strong {
        color: #e11d2e;
        font-weight: 900;
      }
      @media (max-width: 520px) {
        .card {
          padding: 22px 18px 22px;
          border-radius: 22px;
        }
        .toPayAmt {
          font-size: 28px;
        }
        .select {
          height: 56px;
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="top">
          <div class="logo">Heleket</div>
          <div class="topRight">
            <button
              class="iconBtn"
              type="button"
              aria-label="Help"
              onclick="return false;"
            >
              ?
            </button>
            <div class="lang" aria-label="Language">
              <span class="flag">US</span>
              <span>EN</span>
              <span style="color: rgba(15, 23, 42, 0.6)">⌄</span>
            </div>
          </div>
        </div>

        <div class="toPay">
          <div class="toPayLabel">To pay:</div>
          <div class="toPayAmt" id="hk-amount">0.00 USD</div>
        </div>

        <div class="divider"></div>

        <div class="sectionTitle">Select currency</div>

        <div class="fieldLabel">Select currency</div>
        <button class="select" type="button" id="hk-currency">
          <span id="hk-currency-text">Select currency</span>
          <span class="chev">⌄</span>
        </button>
        <div class="menu" id="hk-currency-menu"></div>

        <div class="fieldLabel">Select network</div>
        <button
          class="select"
          type="button"
          id="hk-network"
          aria-disabled="true"
        >
          <span id="hk-network-text">Select network</span>
          <span class="chev">⌄</span>
        </button>
        <div class="menu" id="hk-network-menu"></div>

        <button class="proceed" type="button" id="hk-proceed" disabled>
          Proceed to payment
        </button>

        <div class="timerWrap">
          Time remaining for payment:
          <div class="timerVal">
            <span class="hourglass" aria-hidden="true"></span>
            <span id="hk-timer">00:59:32</span>
          </div>
        </div>
      </div>

      <div class="powered">Powered by <strong>Heleket</strong></div>
    </div>

    <script>
      (function () {
        function pad2(n) {
          return n < 10 ? "0" + String(n) : String(n);
        }

        var params = new URLSearchParams(location.search);
        var amount = Number(params.get("amount") || "0");
        var currency = String(params.get("currency") || "USD").toUpperCase();
        var returnUrl = String(params.get("return") || "/checkout.html");

        document.getElementById("hk-amount").textContent =
          amount.toFixed(2) + " " + currency;

        var currencies = [
          "USDT",
          "USDC",
          "BTC",
          "ETH",
          "BNB",
          "LTC",
          "TRX",
          "SOL",
          "XRP",
          "ADA",
          "DOGE",
          "DOT",
          "MATIC",
          "AVAX",
          "LINK",
          "BCH",
          "XLM",
          "ATOM",
          "ETC",
          "TON",
          "SHIB",
          "UNI",
          "APE",
          "NEAR",
          "FIL",
          "ICP",
          "XMR",
          "EOS",
          "XTZ",
          "DAI",
        ];

        function getNetworks(sym) {
          if (
            sym === "USDT" ||
            sym === "USDC" ||
            sym === "DAI" ||
            sym === "SHIB"
          ) {
            return ["TRC20", "ERC20", "BEP20"];
          }
          if (sym === "BTC") return ["BTC"];
          if (sym === "ETH") return ["ERC20"];
          if (sym === "BNB") return ["BEP20"];
          if (sym === "TRX") return ["TRC20"];
          if (sym === "SOL") return ["SOL"];
          if (sym === "XRP") return ["XRP"];
          if (sym === "DOGE") return ["DOGE"];
          if (sym === "LTC") return ["LTC"];
          return ["Mainnet"];
        }

        var curBtn = document.getElementById("hk-currency");
        var netBtn = document.getElementById("hk-network");
        var curMenu = document.getElementById("hk-currency-menu");
        var netMenu = document.getElementById("hk-network-menu");
        var curText = document.getElementById("hk-currency-text");
        var netText = document.getElementById("hk-network-text");
        var proceed = document.getElementById("hk-proceed");

        var selectedCurrency = null;
        var selectedNetwork = null;

        function closeMenus() {
          curMenu.classList.remove("is-open");
          netMenu.classList.remove("is-open");
        }

        function rebuildMenu(menu, items, onPick) {
          menu.innerHTML = "";
          for (var i = 0; i < items.length; i++) {
            (function () {
              var it = items[i];
              var row = document.createElement("button");
              row.type = "button";
              row.className = "menuItem";
              row.textContent = it;
              row.addEventListener("click", function () {
                onPick(it);
                closeMenus();
              });
              menu.appendChild(row);
            })();
          }
        }

        function refreshProceed() {
          var ok = !!(selectedCurrency && selectedNetwork);
          proceed.disabled = !ok;
          proceed.classList.toggle("is-enabled", ok);
        }

        curBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          closeMenus();
          rebuildMenu(curMenu, currencies, function (v) {
            selectedCurrency = v;
            curText.textContent = v;
            curBtn.classList.add("is-active");
            selectedNetwork = null;
            netText.textContent = "Select network";
            netBtn.classList.remove("is-active");
            netBtn.setAttribute("aria-disabled", "false");
            refreshProceed();
          });
          curMenu.classList.add("is-open");
        });

        netBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          if (!selectedCurrency) return;
          closeMenus();
          rebuildMenu(netMenu, getNetworks(selectedCurrency), function (v) {
            selectedNetwork = v;
            netText.textContent = v;
            netBtn.classList.add("is-active");
            refreshProceed();
          });
          netMenu.classList.add("is-open");
        });

        document.addEventListener("click", function () {
          closeMenus();
        });

        proceed.addEventListener("click", function () {
          if (proceed.disabled) return;
          var url =
            "/heleket-proceed.html?amount=" +
            encodeURIComponent(String(amount)) +
            "&currency=" +
            encodeURIComponent(currency) +
            "&coin=" +
            encodeURIComponent(String(selectedCurrency)) +
            "&network=" +
            encodeURIComponent(String(selectedNetwork)) +
            "&return=" +
            encodeURIComponent(returnUrl);
          location.href = url;
        });

        var until = Date.now() + (59 * 60 + 32) * 1000;
        var timerEl = document.getElementById("hk-timer");
        function tick() {
          var left = Math.max(0, until - Date.now());
          var s = Math.floor(left / 1000);
          var h = Math.floor(s / 3600);
          var m = Math.floor((s % 3600) / 60);
          var r = s % 60;
          timerEl.textContent = pad2(h) + ":" + pad2(m) + ":" + pad2(r);
          if (left > 0) setTimeout(tick, 250);
        }
        tick();
      })();
    </script>
  </body>
</html>
